<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bengal Images</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(-45deg,#0f172a,#1e293b,#7c2d12,#0f172a);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    min-height:100vh;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:3rem;
    text-shadow:0 0 20px orange;
}

header p{
    color:#d1d5db;
}

.gallery{
    max-width:1300px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    overflow:hidden;
    transition:.4s;
    box-shadow:0 0 20px rgba(255,165,0,.2);
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 0 30px orange;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:15px;
}

.back{
    text-align:center;
    margin:30px;
}

.back a{
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#f97316,#ea580c);
    padding:12px 25px;
    border-radius:30px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:#d1d5db;
}
</style></head>
<body><header>
    <h1>🐯 Bengal Images Gallery</h1>
    <p>Photos & Memories From Friends</p>
</header><div class="gallery"><div class="card">
    <img src="IMAGE_LINK_1" alt="Image 1">
    <h3>📸 Memory 1</h3>
</div>

<div class="card">
    <img src="IMAGE_LINK_2" alt="Image 2">
    <h3>📸 Memory 2</h3>
</div>

<div class="card">
    <img src="IMAGE_LINK_3" alt="Image 3">
    <h3>📸 Memory 3</h3>
</div>

<div class="card">
    <img src="IMAGE_LINK_4" alt="Image 4">
    <h3>📸 Memory 4</h3>
</div>

<div class="card">
    <img src="IMAGE_LINK_5" alt="Image 5">
    <h3>📸 Memory 5</h3>
</div>

<div class="card">
    <img src="IMAGE_LINK_6" alt="Image 6">
    <h3>📸 Memory 6</h3>
</div>

</div><div class="back">
    <a href="bengal.html">⬅ Back To Bengal</a>
</div><footer>
⭐ Bengal Friends Gallery ⭐
</footer></body>
</html>
