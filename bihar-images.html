<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bihar Images Gallery</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(-45deg,#0f172a,#1e293b,#14532d,#0f172a);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    min-height:100vh;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:3rem;
    text-shadow:0 0 20px #22c55e;
}

header p{
    color:#d1d5db;
}

.gallery{
    max-width:1300px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    overflow:hidden;
    transition:.4s;
    box-shadow:0 0 20px rgba(34,197,94,.2);
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 0 30px #22c55e;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:15px;
}

.back{
    text-align:center;
    margin:30px;
}

.back a{
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    padding:12px 25px;
    border-radius:30px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:#d1d5db;
}
</style></head>
