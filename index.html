<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Gallery</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#0f172a);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    color:white;
    overflow-x:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.stars{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    50%{
        opacity:.2;
    }
}

header{
    text-align:center;
    padding:50px 20px;
}

header h1{
    font-size:3rem;
    text-shadow:0 0 20px cyan;
}

header p{
    margin-top:10px;
    color:#d1d5db;
}

.container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    padding:20px;
}

.card{
    width:350px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,255,255,.2);
    transition:.4s;
}

.card:hover{
    transform:translateY(-15px) scale(1.03);
    box-shadow:0 0 40px cyan;
}

.card img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.card-content{
    padding:20px;
    text-align:center;
}

.card h2{
    margin-bottom:10px;
}

.card p{
    color:#d1d5db;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#06b6d4,#3b82f6);
    padding:12px 30px;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px cyan;
}

footer{
    text-align:center;
    padding:40px;
    color:#d1d5db;
}
</style></head>
<body><div class="stars" id="stars"></div><header>
    <h1>📸 Friends Gallery 🎥</h1>
    <p>Memories From Bihar & Bengal</p>
</header><div class="container"><div class="card">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" alt="Bihar">
    <div class="card-content">
        <h2>🌾 Bihar</h2>
        <p>Photos, videos and special memories from Bihar.</p>
        <a href="bihar.html" class="btn">Open Bihar</a>
    </div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da?w=800" alt="Bengal">
    <div class="card-content">
        <h2>🐯 Bengal</h2>
        <p>Photos, videos and special memories from Bengal.</p>
        <a href="bengal.html" class="btn">Open Bengal</a>
    </div>
</div>

</div><footer>
    ⭐ Friends Gallery • Made With Friendship ⭐
</footer><script>
const starsContainer = document.getElementById("stars");

for(let i=0;i<100;i++){
    const star=document.createElement("div");
    star.classList.add("star");

    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";

    star.style.animationDelay=Math.random()*3+"s";

    starsContainer.appendChild(star);
}
</script></body>
</html>
